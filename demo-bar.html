<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Animated Top Bar Demo</title>
<style>
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, #7C3AED, #06B6D4, #10B981, #F59E0B, #7C3AED);
  background-size: 200% 100%;
  animation: gradientSlide 3s linear infinite;
  z-index: 9999;
}
@keyframes gradientSlide {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}
body {
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  padding: 60px 40px;
}
h1 { color: oklch(0.65 0.25 293); }
</style>
</head>
<body>
  <h1>Multica Dashboard</h1>
  <p>Погледни самия връх на страницата — цветната лента се движи!</p>
</body>
</html>
